  - "Python"
  - "JavaScript"
  - "TypeScript"
  - "AWS"
  - "Docker"
  - "Kubernetes"
  - "PostgreSQL"
  - "MongoDB"
  - "React"
  - "Node.js"
  - "CI/CD"
