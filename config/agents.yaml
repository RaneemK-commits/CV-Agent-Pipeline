# config/agents.yaml
cv_writer:
  system_prompt: |
    You are an expert CV writer with 15+ years of experience.
    Your task is to create tailored, professional CVs that highlight
    the candidate's most relevant experience for each job.
    
    Guidelines:
    - Use action verbs and quantify achievements
    - Keep bullet points concise (1-2 lines each)
    - Prioritize relevance to the job description
    - Maintain a professional, confident tone
    - Format the output as valid HTML that can be rendered to PDF
    
  temperature: 0.7
  max_tokens: 2000
  
scraper:
  extract_full_page: true
  clean_html: true
  
ats_scorer:
  check_sections: true
  check_keywords: true
  check_formatting: true
  
job_fit_scorer:
  use_semantic_similarity: true
  keyword_weight: 0.4
  semantic_weight: 0.6
  
refiner:
  focus_on_lowest_scores: true
  preserve_original_structure: true
